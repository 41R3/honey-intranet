# NOTA IMPORTANTE PARA LA SUSTENTACIÓN:
# En un clúster K8s real, el backend NO debería controlar Docker vía socket
# montado (eso rompe el aislamiento de contenedores/nodos). La forma correcta
# es que el backend hable con la API de Kubernetes (usando @kubernetes/client-node)
# para crear/eliminar Pods de señuelos dinámicamente, en vez de contenedores Docker
# sueltos. Este manifiesto asume esa migración: el backend usa un ServiceAccount
# con permisos RBAC para crear/borrar pods con el label app=honeypot-instance.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: honey-orchestrator-sa
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: honeypot-manager
rules:
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["create", "delete", "get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: honey-orchestrator-binding
subjects:
  - kind: ServiceAccount
    name: honey-orchestrator-sa
roleRef:
  kind: Role
  name: honeypot-manager
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: honey-backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: honey-backend
  template:
    metadata:
      labels:
        app: honey-backend
    spec:
      serviceAccountName: honey-orchestrator-sa
      containers:
        - name: backend
          image: honey-intranet-backend:latest
          ports:
            - containerPort: 4000
          envFrom:
            - secretRef:
                name: honey-secrets
          readinessProbe:
            httpGet:
              path: /health
              port: 4000
            initialDelaySeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: honey-backend-svc
spec:
  selector:
    app: honey-backend
  ports:
    - port: 4000
      targetPort: 4000
