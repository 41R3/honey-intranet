name: honey-intranet

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: honeyintranet
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./backend/schema.sql:/docker-entrypoint-initdb.d/schema.sql
    ports:
      - "5432:5432"

  mongo:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongodata:/data/db

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data

  backend:
    build: ./backend
    env_file: ./backend/.env
    depends_on:
      - db
      - mongo
      - redis
    ports:
      - "4000:4000"
    volumes:
      # Monta el socket de Docker del HOST para que el backend pueda
      # desplegar/detener contenedores señuelo (esto es lo que hace
      # funcionar el botón "Desplegar" del dashboard de verdad).
      - /var/run/docker.sock:/var/run/docker.sock

  frontend:
    build: ./frontend
    depends_on:
      - backend
    ports:
      - "3000:3000"

  # Imagen base del señuelo. Se construye junto con el resto del stack para que
  # "honeypot-template:latest" siempre exista cuando el backend la instancie
  # dinámicamente vía dockerode al hacer clic en "Desplegar". Esta instancia fija
  # queda idle (sin puerto expuesto al host), no interfiere con los señuelos reales.
  honeypot-template:
    build: ./honeypot-template
    image: honeypot-template:latest

  # Reverse proxy con TLS. En local usa un certificado autofirmado ("tls internal");
  # en el VPS, con un dominio real apuntando acá, Caddy emite HTTPS válido de
  # Let's Encrypt solo con cambiar el bloque `:443 { tls internal }` por el dominio
  # (ver Caddyfile.prod y DEPLOY.md).
  caddy:
    image: caddy:2-alpine
    ports:
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
    depends_on:
      - backend
      - frontend

volumes:
  pgdata:
  mongodata:
  redisdata:
  caddy_data:
