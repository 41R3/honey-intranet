name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json
      - name: Instalar dependencias
        working-directory: backend
        run: npm ci
      - name: Correr tests (Jest)
        working-directory: backend
        run: npm test

  frontend-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - name: Instalar dependencias
        working-directory: frontend
        run: npm ci
      - name: Lint
        working-directory: frontend
        run: npm run lint
      - name: Build de producción
        working-directory: frontend
        run: npm run build

  e2e:
    runs-on: ubuntu-latest
    needs: [backend-tests, frontend-build]
    steps:
      - uses: actions/checkout@v4

      - name: Crear .env del backend para este entorno de CI (no productivo)
        run: |
          cat > backend/.env << EOF
          DATABASE_URL=postgresql://postgres:postgres@db:5432/honeyintranet
          MONGO_URL=mongodb://mongo:27017
          REDIS_URL=redis://redis:6379
          JWT_SECRET=$(openssl rand -hex 32)
          INTERNAL_BACKEND_URL=http://backend:4000
          DOCKER_NETWORK=honey-intranet_default
          NODE_ENV=development
          PORT=4000
          GOOGLE_CLIENT_ID=
          EOF

      - name: Levantar el stack completo
        run: docker compose up -d --build

      - name: Esperar a que el backend responda
        run: |
          for i in $(seq 1 30); do
            curl -sf http://localhost:4000/health && break
            echo "esperando al backend... ($i)"
            sleep 2
          done

      - name: Esperar a que Caddy (TLS) responda
        run: |
          for i in $(seq 1 30); do
            curl -sfk https://localhost/login && break
            echo "esperando a Caddy... ($i)"
            sleep 2
          done

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Instalar dependencias del frontend (para correr Cypress)
        working-directory: frontend
        run: npm ci

      - name: Correr Cypress contra el stack real
        working-directory: frontend
        run: npx cypress run

      - name: Logs del backend (si algo falló)
        if: failure()
        run: docker compose logs backend

      - name: Apagar el stack
        if: always()
        run: docker compose down -v
