name: Deploy

# Se dispara solo cuando el CI ya pasó en main (no despliega código roto).
# Requiere 3 secrets en GitHub (Settings > Secrets and variables > Actions):
#   DEPLOY_HOST      -> IP o dominio del VPS
#   DEPLOY_USER      -> usuario SSH (ej: ubuntu)
#   DEPLOY_SSH_KEY   -> clave privada SSH con acceso a ese usuario
# Ver DEPLOY.md para cómo se generan y dónde se cargan.

on:
  workflow_run:
    workflows: ["CI"]
    branches: [main]
    types:
      - completed

jobs:
  deploy:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - name: Desplegar por SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            cd ~/honey-intranet
            git pull origin main
            docker compose up -d --build
            docker image prune -f
